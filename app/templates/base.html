<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Monotributo Más Fácil{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #2C3178;
      --coral:  #F07B5A;
      --bg:     #F5F6FA;
      --white:  #FFFFFF;
      --text:   #1A1D3B;
      --muted:  #6B7280;
      --border: #E5E7EB;
      --green:  #22C55E;
      --yellow: #F59E0B;
      --red:    #EF4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
      background: var(--navy); display: flex; flex-direction: column;
      padding: 0 0 24px; z-index: 100;
    }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-logo .product-name {
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
      color: white; line-height: 1.2;
    }
    .sidebar-logo .product-name span { color: var(--coral); }
    .sidebar-logo .estudio-name { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 4px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: rgba(255,255,255,.35); padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      color: rgba(255,255,255,.7); text-decoration: none;
      font-size: 14px; font-weight: 600;
      transition: all .15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); color: white; }
    .nav-item.active { background: rgba(240,123,90,.18); color: var(--coral); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 0 12px;
      border-top: 1px solid rgba(255,255,255,.1);
      padding-top: 16px;
    }

    /* Main */
    .main { margin-left: 240px; padding: 32px; min-height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .page-title { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy); }
    .page-subtitle { font-size: 14px; color: var(--muted); margin-top: 2px; }

    /* Botones */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; border: none; text-decoration: none; transition: all .15s;
    }
    .btn-primary { background: var(--coral); color: white; }
    .btn-primary:hover { background: #e06b4a; transform: translateY(-1px); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
    .btn-danger:hover { background: #FECACA; }

    /* Cards */
    .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }

    /* Spinner HTMX */
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3); border-top-color: white;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .htmx-request .spinner { display: inline-block; }
    .htmx-request .btn-label { display: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="product-name">Monotributo<br><span>Más Fácil</span></div>
    <div class="estudio-name">{{ tenant_nombre }}</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Principal</div>
    <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Dashboard
    </a>
    <a href="/emitir" class="nav-item {% if active_page == 'emitir' %}active{% endif %}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      Emitir facturas
    </a>
    <a href="/facturas" class="nav-item {% if active_page == 'facturas' %}active{% endif %}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Facturas emitidas
    </a>
    <div class="nav-label">Clientes</div>
    <a href="/monotributistas" class="nav-item {% if active_page == 'monotributistas' %}active{% endif %}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Mis monotributistas
    </a>
    <div class="nav-label">Cuenta</div>
    <a href="/perfil" class="nav-item {% if active_page == 'perfil' %}active{% endif %}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Configuración
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="/auth/logout" class="nav-item" style="color: rgba(255,255,255,.4); font-size:13px;">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Salir
    </a>
  </div>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script src="/static/app.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
