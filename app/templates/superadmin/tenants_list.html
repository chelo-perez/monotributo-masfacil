{% for r in rows %}
{% set t = r.tenant %}
<a href="/admin/{{ secret }}/tenant/{{ t.id }}"
   style="display:flex;align-items:center;gap:12px;padding:12px 16px;text-decoration:none;color:#1A1D3B;border-bottom:1px solid #E5E7EB;transition:background .1s"
   onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background=''">
  <div style="width:36px;height:36px;border-radius:9px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:.9rem;color:#2C3178">
    {{ t.nombre[0].upper() }}
  </div>
  <div style="flex:1;min-width:0">
    <div style="font-size:.85rem;font-weight:700;color:#2C3178;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ t.nombre }}</div>
    <div style="font-size:.72rem;color:#6B7280">{{ r.owner_email }} · {{ r.n_monos }} monotributistas · {{ r.n_facturas }} facturas · Plan {{ t.plan }}</div>
  </div>
  <span style="font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0;
    background:{% if r.estado == 'activo' %}#f0fdf4{% else %}#f4f5fb{% endif %};
    color:{% if r.estado == 'activo' %}#15803d{% else %}#6b6b8a{% endif %}">
    {{ r.estado | title }}
  </span>
</a>
{% else %}
<div style="text-align:center;padding:32px;color:#6B7280;font-size:14px">
  No hay estudios registrados.
</div>
{% endfor %}
