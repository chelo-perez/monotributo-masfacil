<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — Monotributo Más Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2C3178; --coral: #F07B5A;
      --bg: #F5F6FA; --surface: #fff;
      --border: #E5E7EB; --text: #1A1D3B; --muted: #6B7280;
      --green: #22C55E; --red: #EF4444; --yellow: #F59E0B;
      --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    html, body { height: 100%; font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }

    /* ── Header ── */
    .sa-header {
      background: var(--navy); color: #fff;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 20;
      flex-shrink: 0;
    }
    .sa-header-logo { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; }
    .sa-header-logo span { color: var(--coral); }
    .sa-header-sub { font-size: .7rem; opacity: .55; margin-top: 1px; }

    /* ── Layout ── */
    .sa-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar desktop ── */
    .sa-sidebar {
      width: 210px;
      background: var(--navy);
      padding: 16px 0;
      flex-shrink: 0;
      display: none;
      flex-direction: column;
    }
    @media (min-width: 640px) { .sa-sidebar { display: flex; } }

    .sa-nav-section {
      font-size: .63rem; font-weight: 700; color: rgba(255,255,255,.35);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 14px 16px 5px;
    }
    .sa-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px;
      font-size: .83rem; font-weight: 600;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all .15s;
    }
    .sa-nav-item:hover { color: #fff; background: rgba(255,255,255,.08); }
    .sa-nav-item.active { color: #fff; border-left-color: var(--coral); background: rgba(255,255,255,.1); }
    .sa-nav-item i { font-size: 16px; width: 18px; text-align: center; opacity: .8; }
    .sa-nav-spacer { flex: 1; }
    .sa-nav-footer { border-top: 1px solid rgba(255,255,255,.1); padding: 10px 0; }

    /* ── Contenido ── */
    .sa-main { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .sa-content { max-width: 620px; }

    /* ── Nav inferior mobile ── */
    .sa-bottom-nav {
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,.1);
      display: flex; padding: 8px 0 4px;
      flex-shrink: 0;
    }
    @media (min-width: 640px) { .sa-bottom-nav { display: none; } }
    .sa-bottom-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 4px; text-decoration: none;
      color: rgba(255,255,255,.5); font-size: .62rem; font-weight: 600;
      transition: color .15s;
    }
    .sa-bottom-item.active, .sa-bottom-item:hover { color: #fff; }
    .sa-bottom-item.active .sa-bottom-icon { color: var(--coral); }
    .sa-bottom-icon { font-size: 1.25rem; line-height: 1; }

    /* ── Componentes ── */
    .sa-stat { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; }
    .sa-stat-num { font-family: 'Nunito', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--navy); }
    .sa-stat-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-top: 3px; }

    .sa-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; }
    .sa-card-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .88rem; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    .sa-btn { font-size: .78rem; font-weight: 700; border-radius: 8px; padding: 8px 14px; cursor: pointer; border: none; font-family: inherit; transition: opacity .15s; display: inline-flex; align-items: center; gap: 6px; }
    .sa-btn:hover { opacity: .85; }
    .sa-btn-primary { background: var(--coral); color: #fff; }
    .sa-btn-danger  { background: #fee2e2; color: #b91c1c; }
    .sa-btn-ok      { background: #dcfce7; color: #15803d; }
    .sa-btn-ghost   { background: var(--bg); color: var(--navy); border: 1px solid var(--border); }

    .sa-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .83rem; font-family: inherit; background: #fff; color: var(--text); outline: none; transition: border-color .15s; }
    .sa-input:focus { border-color: var(--navy); }

    .sa-badge { font-size: .67rem; font-weight: 700; border-radius: 20px; padding: 3px 9px; }
    .sa-badge-activo   { background: #dcfce7; color: #15803d; }
    .sa-badge-inactivo { background: #f1f5f9; color: #64748b; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<!-- Header -->
<div class="sa-header">
  <div>
    <div class="sa-header-logo">Monotributo <span>Más Fácil</span> — Admin</div>
    <div class="sa-header-sub">{{ current_user.email }}</div>
  </div>
</div>

<div class="sa-layout">

  <!-- Sidebar desktop -->
  <nav class="sa-sidebar">
    <div class="sa-nav-section">Principal</div>
    <a href="/admin/mmf-admin-2025" class="sa-nav-item {% block nav_inicio %}{% endblock %}">
      <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>
    <a href="/admin/mmf-admin-2025/lista" class="sa-nav-item {% block nav_estudios %}{% endblock %}"
       hx-get="/admin/mmf-admin-2025/lista" hx-target="#tenants-lista" hx-swap="innerHTML">
      <i class="ti ti-users"></i> Estudios contables
    </a>

    <div class="sa-nav-spacer"></div>
    <div class="sa-nav-footer">
      <a href="/auth/logout" class="sa-nav-item">
        <i class="ti ti-logout"></i> Cerrar sesión
      </a>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="sa-main">
    <div class="sa-content">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<!-- Nav inferior mobile -->
<nav class="sa-bottom-nav">
  <a href="/admin/mmf-admin-2025" class="sa-bottom-item {% block nav_bottom_inicio %}{% endblock %}">
    <i class="ti ti-layout-dashboard sa-bottom-icon"></i>
    Inicio
  </a>
  <a href="/admin/mmf-admin-2025/lista" class="sa-bottom-item {% block nav_bottom_estudios %}{% endblock %}">
    <i class="ti ti-users sa-bottom-icon"></i>
    Estudios
  </a>
  <a href="/auth/logout" class="sa-bottom-item">
    <i class="ti ti-logout sa-bottom-icon"></i>
    Salir
  </a>
</nav>

<script>
document.addEventListener('htmx:confirm', (e) => {
  if (e.detail.question && !confirm(e.detail.question)) e.preventDefault();
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
