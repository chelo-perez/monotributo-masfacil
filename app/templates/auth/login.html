<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Monotributo Más Fácil</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #2C3178; --coral: #F07B5A; --bg: #F5F6FA; --border: #E5E7EB; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 48px 40px; width: 100%; max-width: 400px;
    }
    .logo { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .logo span { color: var(--coral); }
    .tagline { text-align: center; font-size: 13px; color: #6B7280; margin-bottom: 36px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Nunito Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color .15s; margin-bottom: 18px;
    }
    input:focus { border-color: var(--navy); }
    .btn-login {
      width: 100%; padding: 13px; background: var(--coral); color: white;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
      transition: background .15s;
    }
    .btn-login:hover { background: #e06b4a; }
    .error-msg {
      background: #FEE2E2; color: #991B1B;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px;
    }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6B7280; }
    .footer-link a { color: var(--coral); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">Monotributo <span>Más Fácil</span></div>
  <div class="tagline">Facturación masiva para estudios contables</div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/login-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="contador@estudio.com.ar" autocomplete="email" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

    <button type="submit" class="btn-login">Ingresar</button>
  </form>

  <div class="footer-link">
    ¿Problemas para ingresar? <a href="mailto:soporte@masfacil.com.ar">Contactá soporte</a>
  </div>
</div>
</body>
</html>
